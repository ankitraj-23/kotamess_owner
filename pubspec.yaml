name: kotamess_owner
description: Native Flutter APK for KotaMess owner-side WhatsApp request management.
publish_to: "none"
version: 1.0.2+3

environment:
    sdk: ">=3.4.0 <4.0.0"

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8
    file_picker: 10.3.8
    shared_preferences: ^2.3.2
    supabase_flutter: ^2.8.0
    flutter_dotenv: ^5.2.1
    archive: ^3.6.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0

flutter:
    uses-material-design: true
    # `.env` is declared so flutter_dotenv can load it from the bundle for local
    # dev (it holds only the PUBLIC Supabase URL + publishable key; never
    # committed — see .gitignore / .env.example). Release/CI builds that omit
    # the file inject the same values with --dart-define instead; startup
    # degrades gracefully to the "Backend not configured" screen if neither is
    # present. See README §2 / PRODUCTION_CHECKLIST.
    assets:
        - .env
