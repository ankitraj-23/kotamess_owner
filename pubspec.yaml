name: kotamess_owner
description: Native Flutter APK for KotaMess owner-side WhatsApp request management.
publish_to: "none"
version: 1.0.1+2

environment:
    sdk: ">=3.4.0 <4.0.0"

dependencies:
    flutter:
        sdk: flutter
    cupertino_icons: ^1.0.8
    file_picker: 10.3.8
    shared_preferences: ^2.3.2
    supabase_flutter: ^2.8.0
    flutter_dotenv: ^5.2.1
    archive: ^3.6.1

dev_dependencies:
    flutter_test:
        sdk: flutter
    flutter_lints: ^5.0.0

flutter:
    uses-material-design: true
    # No bundled assets. Local dev reads SUPABASE_* from an optional `.env`
    # (loaded best-effort at startup, never committed); release/CI inject the
    # same values with --dart-define. See README §2 / PRODUCTION_CHECKLIST.
